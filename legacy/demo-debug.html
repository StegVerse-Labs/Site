<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StegVerse Demo — DEBUG</title>
<style>
body{margin:0;font-family:system-ui,sans-serif;color:#fff;background:#07111f;padding:20px}
.wrap{max-width:600px;margin:0 auto}
.debug{background:rgba(255,209,102,.15);border:1px solid #ffd166;border-radius:12px;padding:16px;margin:20px 0;color:#ffd166;font-family:monospace;font-size:.9rem;white-space:pre-wrap}
.btn{display:block;width:100%;padding:14px;margin:10px 0;background:#6ee7ff;color:#051019;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.result{background:rgba(89,245,155,.1);border:1px solid #59f59b;border-radius:12px;padding:16px;margin:20px 0;color:#59f59b}
.error{background:rgba(255,107,107,.15);border:1px solid #ff6b6b;border-radius:12px;padding:16px;margin:20px 0;color:#ff6b6b}
</style>
</head>
<body>
<div class="wrap">
<h1>StegVerse Demo — DEBUG MODE</h1>
<div class="debug" id="debug-log">Loading...</div>
<button class="btn" id="test-btn" onclick="testEvaluate()">Test Evaluate</button>
<div id="result-area"></div>
</div>

<script>
try {
  document.getElementById("debug-log").textContent = "STEP 1: Script parsed OK\n";

  // Test 1: Can we access DOM?
  var btn = document.getElementById("test-btn");
  document.getElementById("debug-log").textContent += "STEP 2: DOM access OK\n";

  // Test 2: Can we define functions?
  function testFunc() { return 42; }
  document.getElementById("debug-log").textContent += "STEP 3: Function def OK\n";

  // Test 3: Can we use fetch?
  if (typeof fetch !== "undefined") {
    document.getElementById("debug-log").textContent += "STEP 4: fetch available\n";
  } else {
    document.getElementById("debug-log").textContent += "STEP 4: fetch NOT available\n";
  }

  // Test 4: Can we use crypto?
  if (typeof crypto !== "undefined" && crypto.subtle) {
    document.getElementById("debug-log").textContent += "STEP 5: crypto.subtle available\n";
  } else {
    document.getElementById("debug-log").textContent += "STEP 5: crypto.subtle NOT available\n";
  }

  // Test 5: JSON parse
  var testData = {
  "source": "sdk",
  "demo_id": "demo_sdk_default",
  "commit_states": [
    [
      0.234,
      -0.156,
      0.089
    ],
    [
      -0.312,
      0.445,
      -0.078
    ],
    [
      0.189,
      0.067,
      0.234
    ],
    [
      -0.067,
      -0.234,
      0.156
    ],
    [
      0.278,
      -0.089,
      -0.189
    ]
  ],
  "proposed_state": [
    0.089,
    -0.045,
    0.056
  ],
  "metadata": {
    "generated_by": "default",
    "tier": 0,
    "note": "Pre-loaded default data. Tap Evaluate or load a different sample."
  }
};
  document.getElementById("debug-log").textContent += "STEP 6: JSON data loaded\n";

  document.getElementById("debug-log").textContent += "\nALL TESTS PASSED — Ready to evaluate\n";

} catch (err) {
  document.getElementById("debug-log").textContent = "FATAL ERROR: " + err.message + "\n" + err.stack;
}

async function testEvaluate() {
  var area = document.getElementById("result-area");
  area.innerHTML = '<div class="debug">Sending request...</div>';

  try {
    var res = await fetch("https://scw-api.onrender.com/v1/demo/run", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
  "source": "sdk",
  "demo_id": "demo_sdk_default",
  "commit_states": [
    [
      0.234,
      -0.156,
      0.089
    ],
    [
      -0.312,
      0.445,
      -0.078
    ],
    [
      0.189,
      0.067,
      0.234
    ],
    [
      -0.067,
      -0.234,
      0.156
    ],
    [
      0.278,
      -0.089,
      -0.189
    ]
  ],
  "proposed_state": [
    0.089,
    -0.045,
    0.056
  ],
  "metadata": {
    "generated_by": "default",
    "tier": 0,
    "note": "Pre-loaded default data. Tap Evaluate or load a different sample."
  }
})
    });

    var data = await res.json();
    area.innerHTML = '<div class="result">VERDICT: ' + data.verdict + '<br>GOD: ' + (data.god || 'n/a') + '</div>';

  } catch (err) {
    area.innerHTML = '<div class="error">ERROR: ' + err.message + '</div>';
  }
}
</script>
</body>
</html>
