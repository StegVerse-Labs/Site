<title>Transition Table | StegVerse</title>
<style>
:root{--bg:#080b12;--panel:rgba(16,24,39,.84);--text:#eef4ff;--muted:#a9b7cc;--line:rgba(255,255,255,.14);--green:#43d694;--blue:#4da3ff;--gold:#ffbe54;--red:#ff6464}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(67,214,148,.14),transparent 30rem),var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.55}main{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:18px 0 54px}a{color:inherit}nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;margin-bottom:14px}nav div{display:flex;gap:10px;flex-wrap:wrap}nav a{text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:rgba(255,255,255,.05);color:var(--muted)}nav a:hover{color:var(--text);border-color:rgba(67,214,148,.44)}section{border:1px solid var(--line);border-radius:24px;background:var(--panel);padding:clamp(18px,4vw,42px);margin-top:14px;box-shadow:0 18px 60px rgba(0,0,0,.18);overflow:hidden}h1{font-size:clamp(2.2rem,7vw,5.6rem);line-height:.92;margin:0;letter-spacing:-.075em;text-transform:uppercase}h2{margin:0 0 10px;color:var(--green);text-transform:uppercase;letter-spacing:.12em;font-size:.85rem}h3{font-size:1.1rem;margin:.35rem 0}.kicker{color:var(--green);text-transform:uppercase;letter-spacing:.16em;font-size:.76rem;font-weight:900}p{color:var(--muted);font-size:1.02rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.table-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.stack{display:grid;gap:12px}.card,.transition-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(0,0,0,.18);min-width:0}.card strong{display:block;font-size:clamp(1.05rem,4vw,1.45rem);overflow-wrap:anywhere;line-height:1.08}.status{display:inline-flex;margin:3px 5px 3px 0;border:1px solid rgba(67,214,148,.35);border-radius:999px;padding:5px 9px;background:rgba(67,214,148,.08);color:var(--green);font-size:.78rem;text-transform:uppercase}.status.locked{color:var(--red);border-color:rgba(255,100,100,.35);background:rgba(255,100,100,.08)}.status.observed,.status.candidate,.status.frontier{color:var(--gold);border-color:rgba(255,190,84,.35);background:rgba(255,190,84,.08)}.transition-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.transition-id{font-size:1.6rem;font-weight:950;letter-spacing:-.04em}.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--blue))}ul{margin:8px 0 0;padding-left:20px;color:#dbe7f7}li{margin-bottom:7px}@media(max-width:760px){.grid{grid-template-columns:1fr}section{border-radius:18px}}
</style>
