<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body{background:#0b1020;color:white;font-family:sans-serif;padding:20px}
textarea,input{width:100%;background:#111827;color:white;margin-top:10px}
button{margin-top:10px}
.allow{color:#86efac}
.deny{color:#fde68a}
.fail{color:#fca5a5}
</style>
</head>

<body>

<h2>StegVerse Demo</h2>

<input id="api" value="https://scw-api.onrender.com" />
<textarea id="data"></textarea>

<button onclick="run()">Evaluate</button>

<h3 id="verdict"></h3>
<pre id="out"></pre>

<script>

function load() {
document.getElementById("data").value = JSON.stringify({
commit_states: [[0.1,0.1,0.1],[0.2,0.2,0.2]],
proposed_state: [0.15,0.15,0.15]
}, null, 2);
}

async function run() {
const api = document.getElementById("api").value;
const payload = JSON.parse(document.getElementById("data").value);

const res = await fetch(api + "/v1/demo/run", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(payload)
});

const d = await res.json();

/* ---------------- FIX ---------------- */

const r =
d.receipt_full ||
d.receipt_v1 ||
null;

/* ------------------------------------ */

document.getElementById("verdict").innerText = d.verdict;
document.getElementById("verdict").className =
d.verdict === "ALLOW" ? "allow" :
d.verdict === "DENY" ? "deny" : "fail";

document.getElementById("out").innerText = JSON.stringify({
verdict: d.verdict,
god: d.god,
confidence: d.confidence,

receipt_hash: r?.receipt_hash || d.receipt,

decision_id: r?.body?.decision_id,
decision: r?.body?.decision,
input_hash: r?.body?.input_hash,
decision_hash: r?.body?.decision_hash,
runner_attempt: r?.body?.runner_attempt,
evaluated_at: r?.body?.evaluated_at

}, null, 2);
}

load();

</script>
</body>
</html>
