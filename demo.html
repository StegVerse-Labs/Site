<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>StegVerse Demo · Tier 1</title>

<style>
body{font-family:system-ui;margin:0;background:#0b1020;color:#eef2ff}
main{max-width:1100px;margin:0 auto;padding:24px}
textarea,input{width:100%;background:#111827;color:#e5e7eb;border:1px solid #334155;border-radius:10px;padding:10px}
textarea{min-height:260px;font-family:monospace}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 14px;margin-top:10px}
.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:18px;margin-top:16px}
.value{white-space:pre-wrap;font-family:monospace}
.allow{color:#86efac}.deny{color:#fde68a}.fail{color:#fca5a5}
</style>
</head>

<body>
<main>

<h1>StegVerse Commit Boundary Demo</h1>

<div class="card">
<label>Backend URL</label>
<input id="apiBase" value="https://scw-api.onrender.com" />
<button onclick="loadSample()">Load Sample</button>
</div>

<div class="card">
<textarea id="runData"></textarea>
<button onclick="evaluateRun()">Evaluate Commit Boundary</button>
</div>

<div class="card">
<h2>Result</h2>

<h3>Verdict</h3>
<div id="verdict" class="value">—</div>

<h3>GOD</h3>
<div id="god" class="value">—</div>

<h3>Confidence</h3>
<div id="confidence" class="value">—</div>

<h3>Boundary</h3>
<div id="boundary" class="value">—</div>

<h3>Receipt</h3>
<div id="receipt" class="value">—</div>

</div>

</main>

<script>

function loadSample() {
document.getElementById("runData").value = JSON.stringify({
commit_states: [[0.1,0.1,0.1],[0.2,0.2,0.2]],
proposed_state: [0.15,0.15,0.15]
}, null, 2);
}

async function evaluateRun() {
const api = document.getElementById("apiBase").value.replace(/\/$/, "");
let payload;

try {
payload = JSON.parse(document.getElementById("runData").value);
} catch {
showError("Invalid JSON");
return;
}

try {
const res = await fetch(api + "/v1/demo/run", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify(payload)
});

const data = await res.json();

if (!res.ok) throw new Error(data.detail || "Error");

render(data);

} catch (e) {
showError(e.message);
}
}

function render(data) {

const verdictEl = document.getElementById("verdict");
verdictEl.textContent = data.verdict;
verdictEl.className = "value " + (
data.verdict === "ALLOW" ? "allow" :
data.verdict === "DENY" ? "deny" : "fail"
);

document.getElementById("god").textContent = data.god;
document.getElementById("confidence").textContent = data.confidence;

document.getElementById("boundary").textContent =
`Centroid: ${JSON.stringify(data.boundary.centroid)}
Radius: ${data.boundary.radius}
Epsilon: ${data.boundary.epsilon}`;


/* ---------------- FIX IS HERE ---------------- */

const r = data.receipt_full || {};

document.getElementById("receipt").textContent =
`receipt_hash: ${r.receipt_hash || data.receipt}
previous_receipt_hash: ${r.previous_receipt_hash || "null"}
decision_id: ${r.body?.decision_id || "n/a"}
decision: ${r.body?.decision || data.verdict}
input_hash: ${r.body?.input_hash || "n/a"}
decision_hash: ${r.body?.decision_hash || "n/a"}
runner_attempt: ${JSON.stringify(r.body?.runner_attempt || {}, null, 2)}
evaluated_at: ${r.body?.evaluated_at || "n/a"}`;
}

function showError(msg){
document.getElementById("verdict").textContent="FAIL-CLOSED";
document.getElementById("receipt").textContent=msg;
}

loadSample();

</script>
</body>
</html>
