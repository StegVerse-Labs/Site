<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StegVerse — Tier 0/2 Demo</title>
<style>
:root{--bg:#07111f;--panel:#0f1b2d;--panel2:#132640;--text:#edf6ff;--muted:#a8b8cc;--line:rgba(255,255,255,.14);--accent:#6ee7ff;--accent2:#59f59b;--warn:#ffd166;--danger:#ff6b6b;--shadow:0 22px 70px rgba(0,0,0,.34);}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6}
a{color:inherit;text-decoration:none}a:hover{text-decoration:underline}
header{padding:20px 0;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(7,17,31,.92);backdrop-filter:blur(12px);z-index:100}
.nav{width:min(900px,calc(100% - 32px));margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-weight:900;letter-spacing:.15em;text-transform:uppercase;font-size:.92rem}
.links{display:flex;gap:16px;color:var(--muted);font-weight:700;flex-wrap:wrap;font-size:.9rem}
.links a.active{color:var(--accent)}
.wrap{width:min(900px,calc(100% - 32px));margin:0 auto;padding:20px 0}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:24px;margin-top:20px}
.card h1{font-size:clamp(1.8rem,5vw,2.4rem);margin:0 0 12px}
.card h2{font-size:1.3rem;margin:0 0 12px}
.card h3{font-size:1rem;margin:16px 0 8px;color:var(--accent)}
.tier-badge{display:inline-block;padding:6px 14px;border:1px solid var(--accent);border-radius:999px;font-size:.8rem;color:var(--accent);margin-bottom:16px;font-weight:700}
input,textarea{width:100%;background:#0b1626;color:#e5e7eb;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{min-height:240px;margin-top:12px;resize:vertical}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{padding:11px 18px;border-radius:12px;border:0;font-weight:800;font-size:.9rem;cursor:pointer;transition:all .2s;min-height:44px}
button:hover{opacity:.9;transform:translateY(-1px)}button:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#051019}
.btn-secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn-commit{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#051019}
.btn-commit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:16px;padding:20px;margin:16px 0}
.result-card.verdict-allow{border-color:rgba(89,245,155,.4);background:rgba(89,245,155,.06)}
.result-card.verdict-deny{border-color:rgba(255,209,102,.4);background:rgba(255,209,102,.06)}
.result-card.verdict-fail{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.06)}
.verdict-label{font-size:2rem;font-weight:900;margin:0}
.verdict-allow .verdict-label{color:var(--accent2)}
.verdict-deny .verdict-label{color:var(--warn)}
.verdict-fail .verdict-label{color:var(--danger)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:16px 0}
.metric{text-align:center;padding:16px;background:rgba(0,0,0,.2);border-radius:12px}
.metric-value{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:1.6rem;font-weight:700;color:var(--accent)}
.metric-label{font-size:.75rem;text-transform:uppercase;color:var(--muted);margin-top:4px;letter-spacing:.05em}
.receipt-hash{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.85rem;background:rgba(0,0,0,.3);padding:12px;border-radius:10px;word-break:break-all;border:1px solid var(--line);margin:8px 0}
.error-card{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:16px;color:var(--danger);margin:16px 0}
footer{padding:30px 0 50px;color:var(--muted);border-top:1px solid var(--line);margin-top:30px;text-align:center;font-size:.85rem}
@media(max-width:600px){.nav{flex-direction:column;align-items:flex-start}.links{width:100%;justify-content:space-between}.metric-grid{grid-template-columns:repeat(2,1fr)}.btn-row{flex-direction:column}.btn-row button{width:100%}}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="brand" href="index.html">StegVerse</a>
    <nav class="links">
      <a href="index.html">Home</a>
      <a href="demo.html" class="active">Demo</a>
      <a href="product.html">Product</a>
      <a href="pricing.html">Pricing</a>
      <a href="methodology.html">Methodology</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>
<main class="wrap">
  <section class="card">
    <div class="tier-badge">Tier 0/2 · Browser + Backend</div>
    <h1>StegVerse Demo</h1>
    <label>Backend URL (optional — Tier 0 works offline)</label>
    <input id="api" value="https://scw-api.onrender.com" placeholder="Leave blank for Tier 0 only"/>
    <div class="btn-row">
      <button class="btn-primary" onclick="loadDefault()">Default Data</button>
      <button class="btn-secondary" onclick="loadRandom()">Random Data</button>
      <button class="btn-secondary" onclick="clearData()">Clear</button>
      <button class="btn-commit" id="eval-btn" onclick="evaluate()">Evaluate</button>
    </div>
    <textarea id="data">{
  "source": "sdk",
  "demo_id": "demo_sdk_default",
  "commit_states": [
    [
      0.234,
      -0.156,
      0.089
    ],
    [
      -0.312,
      0.445,
      -0.078
    ],
    [
      0.189,
      0.067,
      0.234
    ],
    [
      -0.067,
      -0.234,
      0.156
    ],
    [
      0.278,
      -0.089,
      -0.189
    ]
  ],
  "proposed_state": [
    0.089,
    -0.045,
    0.056
  ],
  "metadata": {
    "generated_by": "default",
    "tier": 0,
    "note": "Pre-loaded default data. Tap Evaluate or load a different sample."
  }
}</textarea>
  </section>
  <section id="result-section" style="display:none">
    <div class="result-card" id="verdict-card">
      <div class="verdict-label" id="verdict-text">—</div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-value" id="god-metric">—</div><div class="metric-label">GOD Divergence</div></div>
        <div class="metric"><div class="metric-value" id="conf-metric">—</div><div class="metric-label">Confidence</div></div>
        <div class="metric"><div class="metric-value" id="rad-metric">—</div><div class="metric-label">Boundary Radius</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Boundary</h3>
      <div class="receipt-hash" id="boundary-details">—</div>
    </div>
    <div class="card">
      <h3>Receipt</h3>
      <div class="receipt-hash" id="receipt-hash">—</div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="copyHash()">Copy Hash</button>
        <button class="btn-secondary" onclick="toggleCanonical()">Show Canonical</button>
      </div>
      <textarea id="canonical" rows="6" readonly style="display:none;margin-top:12px;width:100%;background:#0b1626;color:#e5e7eb;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:monospace;font-size:.8rem"></textarea>
    </div>
    <div class="card" id="tier2-card" style="display:none">
      <h3>Tier 2 — Backend Receipt</h3>
      <div class="receipt-hash" id="tier2-hash">—</div>
    </div>
  </section>
  <section id="error-section" style="display:none">
    <div class="error-card">
      <div id="error-text">Error</div>
      <button onclick="clearError()">Dismiss</button>
    </div>
  </section>
</main>
<footer>StegVerse · Trust failures · Commit-time admissibility · ALLOW / DENY / FAIL-CLOSED</footer>

<script>
// === TIER 0 EVALUATOR (Browser-only) ===
function evaluateLocal(inputs) {
  var n = inputs.commit_states.length;
  var d = inputs.commit_states[0].length;
  var centroid = [0,0,0];
  for (var i = 0; i < 3; i++) {
    var sum = 0;
    for (var j = 0; j < n; j++) sum += inputs.commit_states[j][i];
    centroid[i] = sum / n;
  }
  var radius = 1e-9;
  for (var j = 0; j < n; j++) {
    var dist = 0;
    for (var i = 0; i < 3; i++) dist += Math.pow(inputs.commit_states[j][i] - centroid[i], 2);
    dist = Math.sqrt(dist);
    if (dist > radius) radius = dist;
  }
  var p = inputs.proposed_state;
  var god = 0;
  for (var i = 0; i < 3; i++) god += Math.pow(p[i] - centroid[i], 2);
  god = Math.sqrt(god) / radius;
  var verdict, confidence;
  if (god <= 1.0) { verdict = "ALLOW"; confidence = 1.0 - god; }
  else if (god <= 1.05) { verdict = "DENY"; confidence = 1.0 - (god - 1.0) / 0.05; }
  else { verdict = "FAIL-CLOSED"; confidence = 0.0; }
  confidence = Math.max(0, Math.min(1, confidence));
  var canonical = JSON.stringify({
    v: "0.1.0", source: inputs.source || "unknown", demo_id: inputs.demo_id,
    commit_states: inputs.commit_states, proposed_state: p,
    verdict: verdict, god: god, confidence: confidence,
    boundary_centroid: centroid, boundary_radius: radius, boundary_epsilon: 0.05
  });
  return {
    verdict: verdict, god: god, confidence: confidence,
    boundary: { centroid: centroid, radius: radius, epsilon: 0.05 },
    receipt: { canonical: canonical },
    inputs: { source: inputs.source, commit_count: n, dimensions: d },
    tier: 0
  };
}

// === UI FUNCTIONS ===
function loadDefault() {
  document.getElementById("data").value = JSON.stringify({
  "source": "sdk",
  "demo_id": "demo_sdk_default",
  "commit_states": [
    [
      0.234,
      -0.156,
      0.089
    ],
    [
      -0.312,
      0.445,
      -0.078
    ],
    [
      0.189,
      0.067,
      0.234
    ],
    [
      -0.067,
      -0.234,
      0.156
    ],
    [
      0.278,
      -0.089,
      -0.189
    ]
  ],
  "proposed_state": [
    0.089,
    -0.045,
    0.056
  ],
  "metadata": {
    "generated_by": "default",
    "tier": 0,
    "note": "Pre-loaded default data. Tap Evaluate or load a different sample."
  }
}, null, 2);
  clearResult();
}

function loadRandom() {
  var cs = [];
  for (var k = 0; k < 5; k++) {
    var row = [];
    for (var i = 0; i < 3; i++) row.push(Math.random() * 2 - 1);
    cs.push(row);
  }
  var payload = {
    source: "browser_random",
    demo_id: "random_" + Date.now(),
    commit_states: cs,
    proposed_state: [Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1],
    metadata: { mode: "random_test" }
  };
  document.getElementById("data").value = JSON.stringify(payload, null, 2);
  clearResult();
}

function clearData() {
  document.getElementById("data").value = "";
  clearResult();
}

function clearResult() {
  document.getElementById("result-section").style.display = "none";
  document.getElementById("error-section").style.display = "none";
  document.getElementById("tier2-card").style.display = "none";
  document.getElementById("verdict-text").textContent = "—";
  document.getElementById("verdict-card").className = "result-card";
  document.getElementById("god-metric").textContent = "—";
  document.getElementById("conf-metric").textContent = "—";
  document.getElementById("rad-metric").textContent = "—";
  document.getElementById("boundary-details").textContent = "—";
  document.getElementById("receipt-hash").textContent = "—";
  document.getElementById("canonical").value = "";
  document.getElementById("canonical").style.display = "none";
  document.getElementById("tier2-hash").textContent = "—";
}

function clearError() {
  document.getElementById("error-section").style.display = "none";
}

function showError(msg) {
  document.getElementById("error-text").textContent = msg;
  document.getElementById("error-section").style.display = "block";
  document.getElementById("result-section").style.display = "none";
}

function renderResult(res, tier) {
  document.getElementById("result-section").style.display = "block";
  document.getElementById("verdict-text").textContent = res.verdict;
  document.getElementById("verdict-card").className = "result-card verdict-" + res.verdict.toLowerCase().replace("-", "_");
  document.getElementById("god-metric").textContent = res.god.toFixed(4);
  document.getElementById("conf-metric").textContent = (res.confidence * 100).toFixed(1) + "%";
  document.getElementById("rad-metric").textContent = res.boundary.radius.toFixed(4);
  document.getElementById("boundary-details").textContent =
    "Centroid: [" + res.boundary.centroid.map(function(v){ return v.toFixed(4); }).join(", ") + "]\n" +
    "Radius: " + res.boundary.radius.toFixed(6) + "\n" +
    "Epsilon: " + res.boundary.epsilon.toFixed(4) + "\n" +
    "Dimensions: " + res.inputs.dimensions + "\n" +
    "Commit count: " + res.inputs.commit_count;
  document.getElementById("receipt-hash").textContent = "Tier " + tier + " — " + res.verdict + " (GOD=" + res.god.toFixed(4) + ")";
  document.getElementById("canonical").value = res.receipt.canonical;
}

function copyHash() {
  var hash = document.getElementById("receipt-hash").textContent;
  if (hash !== "—") navigator.clipboard.writeText(hash);
}

function toggleCanonical() {
  var el = document.getElementById("canonical");
  el.style.display = (el.style.display === "none") ? "block" : "none";
}

// === MAIN EVALUATE ===
async function evaluate() {
  var raw = document.getElementById("data").value.trim();
  if (!raw) { showError("Empty data. Load a sample or paste JSON."); return; }
  var inputs;
  try { inputs = JSON.parse(raw); } catch(err) { showError("Invalid JSON: " + err.message); return; }
  if (!Array.isArray(inputs.commit_states) || !Array.isArray(inputs.proposed_state)) {
    showError("Missing commit_states or proposed_state arrays."); return;
  }

  var btn = document.getElementById("eval-btn");
  btn.disabled = true;
  btn.textContent = "Evaluating...";

  // Always do Tier 0 first (instant)
  var localResult = evaluateLocal(inputs);
  renderResult(localResult, 0);

  // Try Tier 2 if backend URL provided
  var api = document.getElementById("api").value.trim();
  if (api) {
    try {
      var res = await fetch(api.replace(/\/$/, "") + "/v1/demo/run", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(inputs)
      });
      if (res.ok) {
        var data = await res.json();
        document.getElementById("tier2-card").style.display = "block";
        document.getElementById("tier2-hash").textContent = JSON.stringify(data, null, 2).substring(0, 500) + "...";
      }
    } catch(err) {
      // Backend unavailable — Tier 0 result already displayed
      console.log("Backend unavailable:", err.message);
    }
  }

  btn.disabled = false;
  btn.textContent = "Evaluate";
}

// Init
loadDefault();
</script>
</body>
</html>
