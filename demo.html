<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StegVerse Demo</title>

<style>
:root {
  --bg:#07111f;
  --panel:#0f1b2d;
  --text:#edf6ff;
  --muted:#a8b8cc;
  --line:rgba(255,255,255,.14);

  --tier1:#6ee7ff;
  --tier2:#59f59b;

  --allow:#59f59b;
  --deny:#ff6b6b;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  width:min(900px,calc(100% - 32px));
  margin:0 auto;
}

/* NAV (matches homepage) */
header{
  padding:20px 0;
  border-bottom:1px solid var(--line);
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-weight:900;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.links{
  display:flex;
  gap:14px;
  color:var(--muted);
}

a{color:inherit;text-decoration:none}
a:hover{text-decoration:underline}

/* INPUT */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-top:20px;
}

textarea,input{
  width:100%;
  background:#0b1626;
  color:white;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

button{
  margin-top:12px;
  padding:10px 16px;
  border-radius:10px;
  border:none;
  background:linear-gradient(135deg,#6ee7ff,#59f59b);
  color:#051019;
  font-weight:800;
}

/* RESULT */
.result{
  margin-top:24px;
}

.section{
  margin-top:20px;
}

/* TIER BOXES */
.tier{
  border-radius:16px;
  padding:16px;
  margin-top:14px;
}

.tier1{
  border:1px solid var(--tier1);
  background:rgba(110,231,255,.06);
}

.tier2{
  border:1px solid var(--tier2);
  background:rgba(89,245,155,.06);
}

h2{
  margin:0 0 10px;
}

h3{
  margin:0 0 8px;
  font-size:1rem;
  opacity:.9;
}

/* LABELS */
.allow{color:var(--allow);font-weight:800;}
.deny{color:var(--deny);font-weight:800;}

pre{
  white-space:pre-wrap;
  font-size:.8rem;
  color:#cfe6ff;
}
</style>
</head>

<body>

<header>
  <div class="wrap nav">
    <a class="brand" href="/">StegVerse</a>
    <div class="links">
      <a href="/demo.html">Demo</a>
      <a href="/product.html">Product</a>
      <a href="/about.html">About</a>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <h2>StegVerse Demo</h2>

    <input id="api" value="https://scw-api.onrender.com"/>

    <textarea id="payload" rows="8">
{
  "commit_states": [
    [0.1,0.1,0.1],
    [0.2,0.2,0.2]
  ],
  "proposed_state": [0.15,0.15,0.15]
}
    </textarea>

    <button onclick="run()">Evaluate</button>
  </div>

  <div id="out" class="result"></div>

</div>

<script>
async function run(){
  const api=document.getElementById("api").value;
  const payload=document.getElementById("payload").value;

  const res=await fetch(api+"/v1/demo/evaluate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:payload
  });

  const data=await res.json();

  const verdict=data.verdict==="ALLOW"
    ?'<span class="allow">ALLOW</span>'
    :'<span class="deny">DENY</span>';

  document.getElementById("out").innerHTML=`

  <div class="section">
    <h2>Result</h2>
    <div>Verdict: ${verdict}</div>
    <div>Confidence: ${data.confidence}</div>
  </div>

  <div class="tier tier1">
    <h3>Tier 1 — Commit Boundary Receipt</h3>
    <pre>${JSON.stringify(data.receipt,null,2)}</pre>
  </div>

  <div class="tier tier2">
    <h3>Tier 2 — Local Test Runner Receipt</h3>
    <pre>${JSON.stringify(data.tier2,null,2)}</pre>
  </div>

  <div class="section">
    <h3>What this proves</h3>
    <div>
      Tier 1 enforces admissibility at commit.<br>
      Tier 2 verifies executable viability post-ALLOW.<br>
      No action occurs without passing both boundaries.
    </div>
  </div>
  `;
}
</script>

</body>
</html>
