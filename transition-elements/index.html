<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Transition Elements</title><style>:root{color-scheme:light dark;--bg:#0f1115;--panel:#171b22;--panel-2:#202632;--text:#f3f5f7;--muted:#aab4c0;--line:#303846;--accent:#8fb7ff;--level-0:#5f6673;--level-1:#7c6ee6;--level-2:#4da3ff;--level-3:#3dd6c6;--level-4:#9be7b5;--level-5:#ffd18f;--bad:#ff9b9b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1115;color:#f3f5f7;line-height:1.55}main{max-width:1120px;margin:0 auto;padding:32px 18px 64px}header,.card{border:1px solid var(--line);border-radius:20px;background:var(--panel);padding:22px}header{background:linear-gradient(135deg,var(--panel),var(--panel-2))}h1{font-size:clamp(2rem,5vw,4rem);line-height:1.1;margin:0 0 12px}p,li,td{color:#aab4c0}a{color:#8fb7ff}.nav,.badges{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}.nav a,.badge{border:1px solid #303846;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.04);color:#f3f5f7;text-decoration:none}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}pre{overflow-x:auto;border:1px solid #303846;border-radius:14px;background:#0a0c10;padding:14px}.level-pill{display:inline-flex;border-radius:999px;padding:5px 9px;font-weight:800;color:#071018}.level-0{background:var(--level-0)}.level-1{background:var(--level-1)}.level-2{background:var(--level-2)}.level-3{background:var(--level-3)}.level-4{background:var(--level-4)}.level-5{background:var(--level-5)}.element-card{border-top:6px solid #303846}.level-border-0{border-top-color:var(--level-0)}.level-border-1{border-top-color:var(--level-1)}.level-border-2{border-top-color:var(--level-2)}.level-border-3{border-top-color:var(--level-3)}.level-border-4{border-top-color:var(--level-4)}.level-border-5{border-top-color:var(--level-5)}footer{margin-top:42px;color:#aab4c0}</style></head>
<body><main><header><p class="badge">Transition Element Index</p><h1>Transition Elements</h1><p>Every mapped transition element has a detail page rendered from shared discovery data.</p></header><nav class="nav"><a href="../transition-discovery.html">Discovery Map</a><a href="../transition-table-classes.html">Transition Classes</a><a href="../stage6-unified-gate-results.html">Stage 6 Unified Gate</a></nav><section><div class="grid" id="elements"></div></section><footer><p id="authority"></p></footer></main>
<script>
async function loadDiscovery(){const response=await fetch("../data/formalism-tests/transition-discovery-map.json",{cache:"no-store"});if(!response.ok)throw new Error("Could not load transition-discovery-map.json");return response.json();}
function pill(level,name){return `<span class="level-pill level-${level}">L${level} · ${name}</span>`;}
loadDiscovery().then((data)=>{document.getElementById("authority").textContent=data.authority_boundary||"";const names=Object.fromEntries(data.scale.levels.map((x)=>[x.level,x.name]));const target=document.getElementById("elements");data.elements.slice().sort((a,b)=>a.completion_level-b.completion_level||a.element_id.localeCompare(b.element_id)).forEach((item)=>{const div=document.createElement("div");div.className=`card element-card level-border-${item.completion_level}`;div.innerHTML=`<h3>${item.name}</h3><p>${pill(item.completion_level,names[item.completion_level])}</p><p>${item.summary}</p><p><a href="../${item.detail_page}">Open detail page</a></p>`;target.appendChild(div);});});
</script></body></html>
