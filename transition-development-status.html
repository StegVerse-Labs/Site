<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Transition Development Status | StegVerse</title><style>:root{--bg:#080b12;--panel:rgba(16,24,39,.84);--text:#eef4ff;--muted:#a9b7cc;--line:rgba(255,255,255,.14);--green:#43d694;--gold:#ffbe54}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.55}main{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:18px 0 54px}a{color:inherit}nav,nav div{display:flex;gap:10px;flex-wrap:wrap}nav{justify-content:space-between;margin-bottom:14px}nav a{text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 11px;background:rgba(255,255,255,.05);color:var(--muted)}section{border:1px solid var(--line);border-radius:24px;background:var(--panel);padding:clamp(18px,4vw,42px);margin-top:14px}h1{font-size:clamp(2.2rem,7vw,5.6rem);line-height:.92;margin:0;letter-spacing:-.075em;text-transform:uppercase}h2{margin:0 0 10px;color:var(--green);text-transform:uppercase;letter-spacing:.12em;font-size:.85rem}.kicker{color:var(--green);text-transform:uppercase;letter-spacing:.16em;font-size:.76rem;font-weight:900}p{color:var(--muted);font-size:1.02rem}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.stack{display:grid;gap:12px}.card{border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(0,0,0,.18)}.card strong{display:block;font-size:clamp(1.05rem,4vw,1.45rem)}.status{display:inline-flex;margin:3px 5px 3px 0;border:1px solid rgba(67,214,148,.35);border-radius:999px;padding:5px 9px;background:rgba(67,214,148,.08);color:var(--green);font-size:.78rem;text-transform:uppercase}.status.frontier{color:var(--gold);border-color:rgba(255,190,84,.35);background:rgba(255,190,84,.08)}ul{padding-left:20px;color:#dbe7f7}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main><nav>
