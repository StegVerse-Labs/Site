name: Site Mirror Readiness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  site-mirror-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Site mirror full readiness checks
        run: python scripts/check_site_mirror_full_readiness.py
