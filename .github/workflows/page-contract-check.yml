name: Page Contract Check

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        default: "https://stegverse-labs.github.io/Site"
      strict_links:
        description: "Fetch and verify discovered same-site links"
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "data/**/*.json"
      - "tools/page_contract_check.py"
      - "data/page-contracts-v1.json"
      - ".github/workflows/page-contract-check.yml"

permissions:
  contents: read

concurrency:
  group: page-contract-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-pages:
    name: Check public page contracts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run page contract checker
        run: |
          STRICT_FLAG=""
          if [ "${{ github.event.inputs.strict_links || 'true' }}" = "true" ]; then
            STRICT_FLAG="--strict-links"
          fi

          python tools/page_contract_check.py \
            --base-url "${{ github.event.inputs.base_url || 'https://stegverse-labs.github.io/Site' }}" \
            --contracts data/page-contracts-v1.json \
            --out-dir page_contract_reports \
            $STRICT_FLAG

      - name: Upload page contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-contract-report
          path: page_contract_reports/
          if-no-files-found: error
