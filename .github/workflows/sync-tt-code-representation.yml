name: Sync TT Code Representation

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'

jobs:
  sync-tt-code-representation:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout canonical TT
        uses: actions/checkout@v4
        with:
          repository: Admissible-Existence/TT
          path: tt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build TT propagation bundle
        working-directory: tt
        run: python scripts/build_transition_element_propagation_bundle.py

      - name: Copy TT bundle into Site
        run: |
          mkdir -p site/data/tt
          cp tt/dist/transition-element-propagation-bundle.manifest.json site/data/tt/transition-element-propagation-bundle.manifest.json

      - name: Render Site TT status
        working-directory: site
        run: python scripts/render_tt_code_representation_status.py

      - name: Check Site TT mirror contract
        working-directory: site
        run: python scripts/check_site_tt_code_representation_mirror.py

      - name: Commit TT mirror updates
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tt/transition-element-propagation-bundle.manifest.json docs/SITE_TT_CODE_REPRESENTATION_STATUS.md docs/SITE_TT_CODE_REPRESENTATION_STATUS.json
          if git diff --cached --quiet; then
            echo "No TT mirror changes to commit."
          else
            git commit -m "Sync TT code representation bundle"
            git push
          fi

      - name: Write summary
        if: always()
        working-directory: site
        run: |
          echo "## TT Code Representation Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Canonical source:** Admissible-Existence/TT" >> "$GITHUB_STEP_SUMMARY"
          echo "**Site bundle:** data/tt/transition-element-propagation-bundle.manifest.json" >> "$GITHUB_STEP_SUMMARY"
          echo "**Site status:** docs/SITE_TT_CODE_REPRESENTATION_STATUS.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Authority boundary:** mirrored status does not grant execution authority." >> "$GITHUB_STEP_SUMMARY"
