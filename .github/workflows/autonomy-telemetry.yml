name: Public Autonomy Telemetry and Bounded Dispatch

on:
  push:
    paths:
      - 'data/autonomy/public-ecosystem-scope.json'
      - 'data/autonomy/repository-role-taxonomy.json'
      - 'data/autonomy/mutation-authority-policy.json'
      - 'data/autonomy/runtime-checks.json'
      - 'data/autonomy/freshness-policy.json'
      - 'data/autonomy/completion-evidence.json'
      - 'scripts/run_public_autonomy_telemetry.py'
      - 'scripts/apply_repository_role_exit_gates.py'
      - 'scripts/run_bounded_autonomy_dispatcher.py'
      - 'scripts/run_autonomy_runtime_verification.py'
      - 'scripts/record_runtime_retry_state.py'
      - 'scripts/bind_runtime_evidence_to_live_status.py'
      - 'scripts/generate_autonomy_roadmap_status.py'
      - '.github/workflows/autonomy-telemetry.yml'
  schedule:
    - cron: '31 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-autonomy-telemetry
  cancel-in-progress: false

jobs:
  run-public-autonomy-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install browser runtime verifier
        run: |
          python -m pip install --disable-pip-version-check playwright==1.52.0
          python -m playwright install --with-deps chromium
      - name: Validate role taxonomy and freshness policy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          taxonomy = json.loads(Path('data/autonomy/repository-role-taxonomy.json').read_text())
          freshness = json.loads(Path('data/autonomy/freshness-policy.json').read_text())
          required_roles = {
              'RUNTIME_PRODUCT', 'LIBRARY_OR_SDK', 'GOVERNANCE_ENGINE',
              'DOCUMENTATION_OR_PROJECTION', 'ARCHIVE_OR_CONTINUITY',
              'TEST_OR_FIXTURE', 'ORGANIZATIONAL_RECORD', 'UNCLASSIFIED'
          }
          assert taxonomy['schema_version'] == '1.0'
          assert required_roles == set(taxonomy['roles'])
          assert taxonomy['authority']['role_assignment_is_completion'] is False
          assert taxonomy['authority']['missing_runtime_evidence_blocks_only_runtime_products'] is True
          assert taxonomy['authority']['manual_user_action_required'] is False
          assert freshness['schema_version'] == '1.0'
          assert freshness['scheduled_interval_minutes'] == 60
          assert freshness['maximum_age_minutes'] == 180
          assert freshness['authority']['freshness_pass_is_overall_completion'] is False
          print('role taxonomy and freshness policy valid')
          PY
      - name: Validate strict Site completion evidence
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          evidence = json.loads(Path('data/autonomy/completion-evidence.json').read_text())
          verified_at = datetime.fromisoformat(evidence['verified_at'].replace('Z', '+00:00'))
          assert evidence['repository'] == 'StegVerse-Labs/Site'
          assert evidence['runtime_observed'] is True
          assert evidence['user_visible_outcome_verified'] is True
          assert evidence['critical_blockers'] == 0
          assert evidence['manual_completion_dependency'] is False
          assert verified_at >= datetime.now(timezone.utc) - timedelta(days=30)
          assert evidence['observed_results']['required_checks'] == 7
          assert evidence['observed_results']['passed_required_checks'] == 7
          assert evidence['observed_results']['failed_required_check_ids'] == []
          assert evidence['authority']['evidence_is_release_authority'] is False
          print('strict Site completion evidence valid')
          PY
      - name: Enumerate and inspect public repositories
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Apply repository roles and role-specific exit gates
        run: python scripts/apply_repository_role_exit_gates.py
      - name: Execute bounded Site-owned remediations
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Reinspect after bounded remediation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Reapply repository roles and exit gates
        run: python scripts/apply_repository_role_exit_gates.py
      - name: Reapply execution telemetry
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Execute runtime verification
        id: runtime
        continue-on-error: true
        run: python scripts/run_autonomy_runtime_verification.py
      - name: Record bounded runtime retry state
        run: python scripts/record_runtime_retry_state.py
      - name: Bind runtime evidence into live telemetry
        run: python scripts/bind_runtime_evidence_to_live_status.py
      - name: Generate role-aware autonomy roadmap
        run: python scripts/generate_autonomy_roadmap_status.py
      - name: Validate role-aware outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          inventory = json.loads(Path('data/autonomy/public-ecosystem-inventory.json').read_text())
          actions = json.loads(Path('data/autonomy/public-next-actions.json').read_text())
          roles = json.loads(Path('data/autonomy/repository-role-classification.json').read_text())
          roadmap = json.loads(Path('data/autonomy/roadmap-status.json').read_text())
          runtime = json.loads(Path('data/autonomy/runtime-verification-evidence.json').read_text())
          retry = json.loads(Path('data/autonomy/runtime-retry-state.json').read_text())
          assert inventory['schema_version'] == '1.1'
          assert inventory['completion_model'] == 'ROLE_SPECIFIC_EXIT_GATES'
          assert actions['schema_version'] == '1.1'
          assert actions['completion_model'] == 'ROLE_SPECIFIC_EXIT_GATES'
          assert roles['repository_count'] == inventory['repository_count']
          assert roles['role_exit_gate_complete'] + roles['role_exit_gate_incomplete'] == inventory['repository_count']
          assert roadmap['schema_version'] == '1.5'
          assert roadmap['repository_role_taxonomy_source'] == 'data/autonomy/repository-role-taxonomy.json'
          assert roadmap['authority_boundary']['missing_runtime_evidence_blocks_only_runtime_products'] is True
          assert roadmap['authority_boundary']['role_assignment_is_completion'] is False
          assert runtime['state'] in {'PASS', 'FAIL'}
          assert retry['latest_runtime_state'] == runtime['state']
          assert retry['automatic_retry_required'] == (runtime['state'] != 'PASS')
          assert all(p['exit_gate'] in {'COMPLETE', 'INCOMPLETE'} for p in roadmap['phases'])
          print('role-aware inventory, queue, roadmap, runtime, and retry state valid')
          PY
      - name: Persist role-aware autonomy state
        run: |
          if git diff --quiet -- data/autonomy; then
            echo "No autonomy state changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/autonomy
          git commit -m "chore: persist role-aware public autonomy cycle"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
      - name: Fail workflow when required runtime checks fail
        if: steps.runtime.outcome == 'failure'
        run: |
          echo "Required runtime verification failed; evidence and retry state were persisted."
          exit 1
