name: Public Autonomy Telemetry and Bounded Dispatch

on:
  push:
    paths:
      - 'data/autonomy/public-ecosystem-scope.json'
      - 'data/autonomy/mutation-authority-policy.json'
      - 'data/autonomy/generated-stegpay-integration-status.json'
      - 'data/autonomy/runtime-checks.json'
      - 'scripts/run_public_autonomy_telemetry.py'
      - 'scripts/run_bounded_autonomy_dispatcher.py'
      - 'scripts/run_autonomy_runtime_verification.py'
      - 'scripts/generate_autonomy_roadmap_status.py'
      - 'scripts/validate_generated_stegpay_integration_status.py'
      - '.github/workflows/autonomy-telemetry.yml'
  schedule:
    - cron: '31 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-autonomy-telemetry
  cancel-in-progress: false

jobs:
  run-public-autonomy-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install browser runtime verifier
        run: |
          python -m pip install --disable-pip-version-check playwright==1.52.0
          python -m playwright install --with-deps chromium
      - name: Validate generated StegPay integration status
        run: python scripts/validate_generated_stegpay_integration_status.py
      - name: Enumerate, inspect, classify, and plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Execute bounded Site-owned remediations
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Reinspect after bounded remediation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Reapply execution telemetry after reinspection
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Execute runtime verification
        id: runtime
        continue-on-error: true
        run: python scripts/run_autonomy_runtime_verification.py
      - name: Generate autonomy roadmap state
        run: python scripts/generate_autonomy_roadmap_status.py
      - name: Validate generated roadmap and runtime evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          roadmap = json.loads(Path('data/autonomy/roadmap-status.json').read_text())
          runtime = json.loads(Path('data/autonomy/runtime-verification-evidence.json').read_text())
          assert roadmap['schema_version'] == '1.2'
          assert roadmap['generated_from'] == 'data/autonomy/live-status.json'
          assert roadmap['runtime_evidence_source'] == 'data/autonomy/runtime-verification-evidence.json'
          assert roadmap['manual_user_action_required'] is False
          assert len(roadmap['phases']) == 5
          assert all(p['exit_gate'] in {'COMPLETE', 'INCOMPLETE'} for p in roadmap['phases'])
          assert all(0 <= int(p['progress_percent']) <= 100 for p in roadmap['phases'])
          assert runtime['state'] in {'PASS', 'FAIL'}
          assert runtime['required_checks'] == len([c for c in runtime['checks'] if c['required']])
          assert runtime['authority']['runtime_check_pass_is_completion'] is False
          print('roadmap and runtime evidence valid')
          PY
      - name: Persist inventory, actions, execution records, runtime evidence, roadmap, and live tree
        run: |
          if git diff --quiet -- data/autonomy; then
            echo "No autonomy state changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/autonomy/public-ecosystem-inventory.json \
            data/autonomy/public-next-actions.json \
            data/autonomy/live-status.json \
            data/autonomy/action-executions.json \
            data/autonomy/objective-contract.json \
            data/autonomy/runtime-checks.json \
            data/autonomy/runtime-verification-evidence.json \
            data/autonomy/generated-stegpay-integration-validation.json \
            data/autonomy/roadmap-status.json
          git commit -m "chore: persist bounded public autonomy cycle"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
      - name: Fail workflow when required runtime checks fail
        if: steps.runtime.outcome == 'failure'
        run: |
          echo "Required runtime verification failed; evidence was persisted for repair."
          exit 1
