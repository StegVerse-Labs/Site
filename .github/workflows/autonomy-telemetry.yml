name: Public Autonomy Telemetry and Bounded Dispatch

on:
  push:
    paths:
      - 'data/autonomy/public-ecosystem-scope.json'
      - 'data/autonomy/mutation-authority-policy.json'
      - 'data/autonomy/generated-stegpay-integration-status.json'
      - 'scripts/run_public_autonomy_telemetry.py'
      - 'scripts/run_bounded_autonomy_dispatcher.py'
      - 'scripts/validate_generated_stegpay_integration_status.py'
      - '.github/workflows/autonomy-telemetry.yml'
  schedule:
    - cron: '31 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-autonomy-telemetry
  cancel-in-progress: false

jobs:
  run-public-autonomy-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate generated StegPay integration status
        run: python scripts/validate_generated_stegpay_integration_status.py
      - name: Enumerate, inspect, classify, and plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Execute bounded Site-owned remediations
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Reinspect after bounded remediation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/run_public_autonomy_telemetry.py
      - name: Reapply execution telemetry after reinspection
        run: python scripts/run_bounded_autonomy_dispatcher.py
      - name: Persist inventory, actions, execution records, validation, and live tree
        run: |
          if git diff --quiet -- data/autonomy; then
            echo "No autonomy state changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/autonomy/public-ecosystem-inventory.json \
            data/autonomy/public-next-actions.json \
            data/autonomy/live-status.json \
            data/autonomy/action-executions.json \
            data/autonomy/objective-contract.json \
            data/autonomy/runtime-checks.json \
            data/autonomy/generated-stegpay-integration-validation.json
          git commit -m "chore: persist bounded public autonomy cycle"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
