name: Site Public Mirror Status Guard

on:
  workflow_dispatch:
  schedule:
    - cron: '47 */6 * * *'
  push:
    paths:
      - "index.html"
      - "docs/SITE_FINAL_ACTIVATION_PENDING.md"
      - "docs/SITE_MIRROR_ACTIVATION_STATUS.md"
      - "docs/SITE_MIRROR_HANDOFF.md"
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.md"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.md"
      - "docs/SITE_GOVERNED_ECOSYSTEM_STATUS.txt"
      - "docs/SITE_GOVERNED_ECOSYSTEM_PUBLIC_VERIFICATION.json"
      - "docs/SITE_PUBLIC_PATHS.md"
      - "governed-ecosystem.html"
      - "scripts/check_site_final_activation_pending.py"
      - "scripts/check_site_mirror_handoff_final_pending.py"
      - "scripts/check_site_non_activation_mirror_status.py"
      - "scripts/check_site_governed_ecosystem_mirror.py"
      - "scripts/check_site_governed_ecosystem_public_verification.py"
      - "scripts/check_site_homepage_governed_ecosystem.py"
      - "scripts/check_site_public_paths.py"
      - ".github/workflows/site-public-mirror-status-guard.yml"

jobs:
  public-mirror-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Check public mirror status boundaries
        run: python scripts/check_site_non_activation_mirror_status.py

      - name: Check homepage governed ecosystem link
        run: python scripts/check_site_homepage_governed_ecosystem.py

      - name: Check public path semantics
        run: python scripts/check_site_public_paths.py

      - name: Check governed ecosystem public verification state
        run: python scripts/check_site_governed_ecosystem_public_verification.py

      - name: Check final activation pending boundary
        run: python scripts/check_site_final_activation_pending.py

      - name: Check governed ecosystem mirror
        run: python scripts/check_site_governed_ecosystem_mirror.py

      - name: Check handoff final-pending boundary
        run: python scripts/check_site_mirror_handoff_final_pending.py
