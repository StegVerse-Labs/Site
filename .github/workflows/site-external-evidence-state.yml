name: Site External Evidence State

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'
  workflow_run:
    workflows:
      - Sync TT Code Representation
      - Validate Governance Observatory Status
    types:
      - completed
  push:
    paths:
      - "data/tt/transition-element-propagation-bundle.manifest.json"
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.md"
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.json"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.md"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.json"
      - "scripts/write_site_external_evidence_state.py"
      - ".github/workflows/site-external-evidence-state.yml"

permissions:
  contents: write

concurrency:
  group: site-external-evidence-state
  cancel-in-progress: false

jobs:
  write-external-evidence-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Write computed external evidence state
        run: python scripts/write_site_external_evidence_state.py

      - name: Commit computed evidence state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SITE_EXTERNAL_EVIDENCE_STATE.json docs/SITE_EXTERNAL_EVIDENCE_STATE.md
          if git diff --cached --quiet; then
            echo "No evidence state changes to commit."
          else
            git commit -m "Update Site external evidence state"
            git push
          fi

      - name: Write summary
        if: always()
        run: |
          echo "## Site External Evidence State" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository-managed evidence state was computed from checked-in Site status artifacts." >> "$GITHUB_STEP_SUMMARY"
