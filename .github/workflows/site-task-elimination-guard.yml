name: Site Task Elimination Guard

on:
  workflow_dispatch:
  schedule:
    - cron: '31 */6 * * *'
  push:
    paths:
      - "docs/SITE_MANUAL_TASK_ELIMINATION.md"
      - "docs/SITE_MIRROR_HANDOFF.md"
      - "scripts/check_site_manual_task_elimination.py"
      - ".github/workflows/site-task-elimination-guard.yml"

jobs:
  task-elimination-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Check local task elimination state
        run: python scripts/check_site_manual_task_elimination.py

      - name: Write summary
        if: always()
        run: |
          echo "## Site Task Elimination Guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Checked that Site local continuation work is workflow-managed." >> "$GITHUB_STEP_SUMMARY"
