name: Site T-CL Propagation Receipt

on:
  push:
    paths:
      - "docs/SITE_TCL_PROPAGATION_INTAKE.json"
      - "docs/SITE_TCL_PROPAGATION_RECEIPT.json"
      - "scripts/check_site_tcl_propagation_receipt.py"
      - ".github/workflows/site-tcl-propagation-receipt.yml"
  pull_request:
    paths:
      - "docs/SITE_TCL_PROPAGATION_INTAKE.json"
      - "docs/SITE_TCL_PROPAGATION_RECEIPT.json"
      - "scripts/check_site_tcl_propagation_receipt.py"
      - ".github/workflows/site-tcl-propagation-receipt.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/check_site_tcl_propagation_receipt.py
