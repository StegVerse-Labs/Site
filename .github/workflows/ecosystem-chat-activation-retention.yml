name: Ecosystem Chat Activation Retention

on:
  workflow_run:
    workflows:
      - Site Task Runner
    types:
      - completed
  schedule:
    - cron: "11 * * * *"
  push:
    paths:
      - 'scripts/watch_ecosystem_chat_adapter_monitor.py'
      - '.github/workflows/ecosystem-chat-activation-retention.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ecosystem-chat-activation-retention
  cancel-in-progress: false

jobs:
  retain-owner-routed-state:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Watch adapter activation monitor
        run: python scripts/watch_ecosystem_chat_adapter_monitor.py

      - name: Download Site task diagnostic when available
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: site-task-diagnostic-${{ github.event.workflow_run.id }}-*
          path: reports
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download live verification receipt when available
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: external-chat-live-verification-${{ github.event.workflow_run.id }}-*
          path: reports
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download activation evidence when available
        if: github.event_name == 'workflow_run'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: external-chat-activation-evidence-${{ github.event.workflow_run.id }}-*
          path: reports
          merge-multiple: true
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Reacquire immutable activation receipt or stable blocker status
        run: python scripts/acquire_ecosystem_chat_live_activation_receipt.py

      - name: Validate acquired activation import state
        run: python scripts/check_ecosystem_chat_activation_receipt_import.py

      - name: Import external owner activation states
        env:
          STEGVERSE_REPO_SYNC_TOKEN: ${{ secrets.STEGVERSE_REPO_SYNC_TOKEN }}
        run: python scripts/import_ecosystem_chat_external_activation_states.py

      - name: Rebuild machine-owned activation state
        run: python scripts/update_ecosystem_chat_activation_state.py

      - name: Validate activation-state and propagation consistency
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          state = json.loads(Path('data/ecosystem-chat-activation-state.json').read_text())
          propagation = json.loads(Path('data/ecosystem-chat-activation-propagation.json').read_text())
          imported = json.loads(Path('data/ecosystem-chat-destination-activation-import-status.json').read_text())
          watch = json.loads(Path('data/ecosystem-chat-adapter-monitor-watch.json').read_text())

          assert state['manual_user_action_required'] is False
          assert propagation['source_state_sha256'] == state['state_sha256']
          assert state['gates']['destination_state_imported'] is True
          assert state['gates']['external_import_status_recorded'] is True
          assert watch['schema'] == 'stegverse.ecosystem_chat.adapter_monitor_watch.v1'
          assert watch['manual_user_action_required'] is False
          material = dict(watch)
          expected = material.pop('watch_sha256')
          actual = hashlib.sha256(json.dumps(material, sort_keys=True, separators=(',', ':'), ensure_ascii=False).encode()).hexdigest()
          assert expected == actual

          if imported['state'] == 'VERIFIED_SOURCE_RECEIPT_IMPORTED':
              assert imported['receipt_present'] is True
              assert imported['receipt_state'] == 'VERIFIED'
          else:
              assert imported['state'] == 'PENDING_SOURCE_RECEIPT'
              assert imported['receipt_present'] is False
              assert imported['source_activation_state'] == 'PENDING'
              assert imported['source_blockers']
              assert state['state'] == 'ACTIVATION_PENDING_EVIDENCE'
              assert propagation['state'] == 'PENDING_ACTIVATION_EVIDENCE'

          print('activation retention and adapter monitor watch are internally consistent')
          PY

      - name: Persist retained evidence and continuation state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/ecosystem-chat-adapter-monitor-watch.json \
            data/ecosystem-chat-activation-state.json \
            data/ecosystem-chat-activation-propagation.json \
            data/ecosystem-chat-destination-activation-import-status.json \
            data/ecosystem-chat-destination-activation-state.external.json \
            data/ecosystem-chat-custody-activation-state.external.json \
            data/ecosystem-chat-external-activation-import-status.json \
            reports/site-task-diagnostic.json \
            reports/external-chat-live-verification.json \
            reports/external-chat-activation-evidence.json || true
          if [ -f data/ecosystem-chat-destination-activation-receipt.json ]; then
            git add data/ecosystem-chat-destination-activation-receipt.json
          fi
          if git diff --cached --quiet; then
            echo "No Ecosystem Chat activation state changes to commit."
            exit 0
          fi
          git commit -m "chore: retain Ecosystem Chat activation evidence [activation-state]"
          git pull --rebase
          git push

      - name: Summarize owner-routed continuation
        if: always()
        run: |
          echo "## Ecosystem Chat Activation Retention" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/ecosystem-chat-adapter-monitor-watch.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          watch = json.loads(Path('data/ecosystem-chat-adapter-monitor-watch.json').read_text())
          print(f"Adapter monitor watch: {watch.get('state')}")
          print(f"Adapter monitor blockers: {', '.join(watch.get('blockers', [])) or 'none'}")
          PY
          fi
          if [ -f data/ecosystem-chat-activation-state.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          state = json.loads(Path('data/ecosystem-chat-activation-state.json').read_text())
          print(f"Activation state: {state.get('state')}")
          print(f"Manual user action required: {state.get('manual_user_action_required')}")
          print(f"Owner-routed actions: {len(state.get('next_actions', []))}")
          print(f"State SHA-256: {state.get('state_sha256')}")
          PY
          fi
