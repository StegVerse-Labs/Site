name: Check HIL Live Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - main
    paths:
      - 'humans-as-interoperability-layer.html'
      - 'assets/hil-experiment.js'
      - 'data/hil-experiment.json'
      - 'data/hil-primary-v0.5-review.pdf.b64'
      - 'data/hil-responses.json'
      - 'data/hil-traces/**'
      - 'scripts/check_hil_live_readiness.py'
      - '.github/workflows/check-hil-live-readiness.yml'

permissions:
  contents: read

concurrency:
  group: check-hil-live-readiness
  cancel-in-progress: true

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out Site
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Observe deployed HIL Site, artifact, intake, review, and publication surfaces
        id: observe
        continue-on-error: true
        run: python scripts/check_hil_live_readiness.py --output reports/hil-live-readiness.latest.json

      - name: Write workflow summary
        if: always()
        run: |
          echo '## HIL live readiness observation' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo 'This workflow observes deployed state only and grants no activation, publication, execution, or Master Record authority.' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/hil-live-readiness.latest.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat reports/hil-live-readiness.latest.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Observation JSON was not produced.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload observation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hil-live-readiness-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/hil-live-readiness.latest.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce approved Site surface
        if: steps.observe.outcome == 'failure'
        run: |
          echo 'The deployed approved HIL Site surface was not observed.' >&2
          exit 1
