name: Site Continuation Guard

on:
  workflow_dispatch:
  schedule:
    - cron: '57 */6 * * *'
  push:
    paths:
      - "docs/SITE_SELF_MANAGED_COMPLETION.md"
      - "docs/SITE_MIRROR_HANDOFF.md"
      - "docs/SITE_MIRROR_ECOSYSTEM_MANAGEMENT_HANDOFF.md"
      - "docs/SITE_MIRROR_ACTIVATION_LEDGER.json"
      - "docs/SITE_MIRROR_ACTIVATION_STATUS.md"
      - "docs/SITE_FINAL_ACTIVATION_PENDING.md"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.md"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.json"
      - "scripts/check_site_self_managed_completion.py"
      - "scripts/check_site_mirror_handoff.py"
      - "scripts/check_site_final_activation_pending.py"
      - "scripts/check_site_governance_observatory_status.py"
      - ".github/workflows/site-self-managed-completion.yml"

jobs:
  continuation-guard:
    name: Verify Site continuation handoff
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Check Site mirror handoff
        run: python scripts/check_site_mirror_handoff.py

      - name: Check Site continuation document
        run: python scripts/check_site_self_managed_completion.py

      - name: Check final activation pending boundary
        run: python scripts/check_site_final_activation_pending.py

      - name: Check Governance Observatory status mirror
        run: python scripts/check_site_governance_observatory_status.py

      - name: Write summary
        if: always()
        run: |
          echo "## Site Continuation Guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Handoff: docs/SITE_MIRROR_HANDOFF.md" >> "$GITHUB_STEP_SUMMARY"
          echo "Continuation: docs/SITE_SELF_MANAGED_COMPLETION.md" >> "$GITHUB_STEP_SUMMARY"
          echo "Final activation pending: docs/SITE_FINAL_ACTIVATION_PENDING.md" >> "$GITHUB_STEP_SUMMARY"
          echo "Governance Observatory status: docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.md" >> "$GITHUB_STEP_SUMMARY"
          echo "Activation remains pending until external workflow evidence exists." >> "$GITHUB_STEP_SUMMARY"
