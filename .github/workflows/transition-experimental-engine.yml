name: Transition Experimental Engine

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/transition-elements.json'
      - 'tools/transition_experimental_orchestrator.py'
      - 'tools/build_transition_pages.py'
      - 'transition-table.html'
      - 'transition-periodic-table.html'
      - '.github/workflows/transition-experimental-engine.yml'

permissions:
  contents: write

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run next eligible transition experiment
        run: python tools/transition_experimental_orchestrator.py
      - name: Rebuild transition element pages
        run: python tools/build_transition_pages.py
      - name: Commit generated transition outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "run transition experimental engine"
          file_pattern: data/*.json data/*.jsonl transition-elements/*.html
