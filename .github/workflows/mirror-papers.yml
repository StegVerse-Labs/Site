name: Mirror Papers from Publisher

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Repository to mirror from, owner/name"
        required: false
        default: "GCAT-BCAT-Engine/Publisher"
      source_ref:
        description: "Source branch, tag, or SHA"
        required: false
        default: "main"
  schedule:
    - cron: "17 */6 * * *"

jobs:
  mirror-papers:
    name: Mirror papers into Site
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    env:
      DEFAULT_SOURCE_REPOSITORY: "GCAT-BCAT-Engine/Publisher"
      DEFAULT_SOURCE_REF: "main"
      DEFAULT_SOURCE_PATH: "papers"
      TARGET_REPOSITORY: "StegVerse-Labs/Site"

    steps:
      - name: Resolve mirror inputs
        id: mirror
        run: |
          SOURCE_REPOSITORY="${{ github.event.inputs.source_repository }}"
          SOURCE_REF="${{ github.event.inputs.source_ref }}"

          if [ -z "$SOURCE_REPOSITORY" ]; then
            SOURCE_REPOSITORY="${{ vars.PAPERS_SOURCE_REPOSITORY }}"
          fi

          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="${{ vars.PAPERS_SOURCE_REF }}"
          fi

          if [ -z "$SOURCE_REPOSITORY" ]; then
            SOURCE_REPOSITORY="$DEFAULT_SOURCE_REPOSITORY"
          fi

          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="$DEFAULT_SOURCE_REF"
          fi

          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "source_path=$DEFAULT_SOURCE_PATH" >> "$GITHUB_OUTPUT"

          echo "Resolved source repository: $SOURCE_REPOSITORY"
          echo "Resolved source ref: $SOURCE_REF"
          echo "Resolved source path: $DEFAULT_SOURCE_PATH"

      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Check Site paper display policy
        working-directory: site
        run: |
          python scripts/check_paper_display_policy.py

      - name: Check Transition Table public copy
        working-directory: site
        run: |
          python scripts/check_transition_table_public_copy.py

      - name: Check Site public ingestion contract
        working-directory: site
        run: |
          python scripts/check_site_public_ingestion_contract.py

      - name: Check Site mirror evidence packet
        working-directory: site
        run: |
          python scripts/check_site_mirror_evidence_packet.py

      - name: Check Site mirror live evidence state
        working-directory: site
        run: |
          python scripts/check_site_mirror_live_evidence_state.py

      - name: Checkout source papers repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.mirror.outputs.source_repository }}
          ref: ${{ steps.mirror.outputs.source_ref }}
          path: site/_source
          token: ${{ secrets.STEGVERSE_REPO_SYNC_TOKEN || github.token }}

      - name: Verify source papers path
        working-directory: site
        run: |
          if [ ! -d "_source/${{ steps.mirror.outputs.source_path }}" ]; then
            echo "Source checkout succeeded, but _source/${{ steps.mirror.outputs.source_path }} was not found."
            echo "Expected source path: ${{ steps.mirror.outputs.source_path }}"
            echo "Source repository: ${{ steps.mirror.outputs.source_repository }}"
            echo "Source ref: ${{ steps.mirror.outputs.source_ref }}"
            exit 1
          fi

          echo "Source papers path found."
          find "_source/${{ steps.mirror.outputs.source_path }}" -maxdepth 3 -type f -print | head -50

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Mirror papers and generate indexes
        working-directory: site
        env:
          SOURCE_REPOSITORY: ${{ steps.mirror.outputs.source_repository }}
          SOURCE_REF: ${{ steps.mirror.outputs.source_ref }}
          SOURCE_PATH: ${{ steps.mirror.outputs.source_path }}
          TARGET_REPOSITORY: ${{ env.TARGET_REPOSITORY }}
        run: |
          python scripts/mirror_papers.py

      - name: Check mirrored manifest metadata
        working-directory: site
        run: |
          python scripts/check_papers_manifest_metadata.py

      - name: Check paper aliases
        working-directory: site
        run: |
          python scripts/check_paper_aliases.py

      - name: Write Site mirror evidence
        working-directory: site
        env:
          SOURCE_REPOSITORY: ${{ steps.mirror.outputs.source_repository }}
          SOURCE_REF: ${{ steps.mirror.outputs.source_ref }}
          SITE_MIRROR_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SITE_MIRROR_COMMIT_SHA: ${{ github.sha }}
          ALIAS_VERIFICATION_RESULTS: "valid: Site paper aliases resolve"
        run: |
          python scripts/write_site_mirror_evidence.py

      - name: Check Site mirror evidence packet after writing evidence
        working-directory: site
        run: |
          python scripts/check_site_mirror_evidence_packet.py

      - name: Check live evidence state after writing evidence
        working-directory: site
        run: |
          python scripts/check_site_mirror_live_evidence_state.py

      - name: Upload Site mirror evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-mirror-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            site/docs/SITE_MIRROR_EVIDENCE_PACKET.md
            site/docs/SITE_MIRROR_LIVE_EVIDENCE_STATE.json
          if-no-files-found: error

      - name: Write summary
        if: always()
        working-directory: site
        run: |
          echo "## Mirror Papers from Publisher" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source repository:** ${{ steps.mirror.outputs.source_repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source ref:** ${{ steps.mirror.outputs.source_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source path:** ${{ steps.mirror.outputs.source_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** StegVerse-Labs/Site/papers" >> "$GITHUB_STEP_SUMMARY"
          echo "**Public index:** Papers.html" >> "$GITHUB_STEP_SUMMARY"
          echo "**Aliases:** papers.html, papers/, publisher/papers.html, publisher/papers/" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence packet:** docs/SITE_MIRROR_EVIDENCE_PACKET.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Live evidence state:** docs/SITE_MIRROR_LIVE_EVIDENCE_STATE.json" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence artifact:** site-mirror-evidence-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Public ingestion contract:** docs/SITE_PUBLIC_PATH_AND_INGESTION_SURFACE_HARDENING.md" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f papers/papers_manifest.json ]; then
            echo "### Papers manifest" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat papers/papers_manifest.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Mirror did not produce papers_manifest.json" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "If source checkout failed with repository not found, the source repo is private/inaccessible to the Site workflow token." >> "$GITHUB_STEP_SUMMARY"
            echo "Configure the Site workflow with repository-read credentials for GCAT-BCAT-Engine/Publisher." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit mirrored papers and evidence
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Papers.html papers.html papers publisher scripts/mirror_papers.py scripts/check_papers_manifest_metadata.py scripts/check_paper_aliases.py scripts/check_site_mirror_evidence_packet.py scripts/check_site_mirror_live_evidence_state.py scripts/write_site_mirror_evidence.py scripts/check_transition_table_public_copy.py scripts/check_site_public_ingestion_contract.py docs/SITE_PAPER_DISPLAY_POLICY.md docs/README_SITE_PAPERS_MIRROR.md docs/SITE_MIRROR_EVIDENCE_PACKET.md docs/SITE_MIRROR_LIVE_EVIDENCE_STATE.json docs/SITE_PUBLIC_PATHS.md docs/SITE_INGESTION_SURFACES.md docs/SITE_PUBLIC_PATH_AND_INGESTION_SURFACE_HARDENING.md docs/SITE_TRAFFIC_AND_INGESTION_SIGNAL.md scripts/check_paper_display_policy.py

          if git diff --cached --quiet; then
            echo "No paper mirror or evidence changes to commit."
          else
            git commit -m "Mirror papers and Site evidence from Publisher"
            git push
          fi
