name: Site Task Runner

on:
  workflow_dispatch:
    inputs:
      task:
        description: Declared Site task to run
        required: true
        default: all-local
        type: choice
        options:
          - all-local
          - validate
          - test-readiness
          - mirror-readiness
          - public-guard
          - live-url
          - tt-status
          - external-evidence
          - task-elimination-guard
          - local-completion-receipt
          - autonomous-continuation
          - universal-ingest
          - import-governed-transition-index
  schedule:
    - cron: '17 */6 * * *'
  workflow_run:
    workflows:
      - Site Bootstrap Validate
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: site-task-runner
  cancel-in-progress: false

env:
  STEGVERSE_REPO_SYNC_TOKEN: ${{ secrets.STEGVERSE_REPO_SYNC_TOKEN }}

jobs:
  run-site-task:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.task }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=all-local" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Site
        uses: actions/checkout@v4
        with:
          path: site
          persist-credentials: true

      - name: Resolve TT checkout mode
        id: tt_mode
        run: |
          if [ -n "${STEGVERSE_REPO_SYNC_TOKEN:-}" ]; then
            echo "use_private_checkout=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_private_checkout=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout canonical TT
        if: steps.tt_mode.outputs.use_private_checkout == 'true'
        uses: actions/checkout@v4
        with:
          repository: Admissible-Existence/TT
          ref: main
          path: tt
          token: ${{ secrets.STEGVERSE_REPO_SYNC_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install optional ingest dependencies
        if: steps.task.outputs.name == 'all-local' || steps.task.outputs.name == 'universal-ingest'
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4

      - name: Build TT propagation bundle
        if: steps.tt_mode.outputs.use_private_checkout == 'true' && (steps.task.outputs.name == 'all-local' || steps.task.outputs.name == 'tt-status' || steps.task.outputs.name == 'autonomous-continuation')
        working-directory: tt
        run: python scripts/build_transition_element_propagation_bundle.py

      - name: Copy TT bundle into Site
        if: steps.tt_mode.outputs.use_private_checkout == 'true' && (steps.task.outputs.name == 'all-local' || steps.task.outputs.name == 'tt-status' || steps.task.outputs.name == 'autonomous-continuation')
        run: |
          mkdir -p site/data/tt
          cp tt/dist/transition-element-propagation-bundle.manifest.json site/data/tt/transition-element-propagation-bundle.manifest.json

      - name: Confirm checked-in TT fallback
        if: steps.tt_mode.outputs.use_private_checkout != 'true' && (steps.task.outputs.name == 'all-local' || steps.task.outputs.name == 'tt-status' || steps.task.outputs.name == 'autonomous-continuation')
        run: |
          test -f site/data/tt/transition-element-propagation-bundle.manifest.json
          echo "Using checked-in Site TT bundle fallback because STEGVERSE_REPO_SYNC_TOKEN is not available."

      - name: Acquire governed transition projection
        if: steps.task.outputs.name == 'all-local'
        working-directory: site
        run: python scripts/acquire_governed_transition_index.py

      - name: Acquire external framework catalog and Ecosystem Chat activation evidence
        if: steps.task.outputs.name == 'all-local'
        working-directory: site
        run: python scripts/acquire_external_framework_catalog.py

      - name: Persist activation import state before downstream validation
        if: steps.task.outputs.name == 'all-local' && github.ref == 'refs/heads/main'
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ecosystem-chat-destination-activation-import-status.json || true
          if [ -f data/ecosystem-chat-destination-activation-receipt.json ]; then
            git add data/ecosystem-chat-destination-activation-receipt.json
          fi
          if git diff --cached --quiet; then
            echo "Activation import state unchanged."
          else
            git commit -m "chore: retain Ecosystem Chat activation import state [skip ci]"
            git pull --rebase
            git push
          fi

      - name: Run declared Site task
        working-directory: site
        run: python scripts/run_site_task.py "${{ steps.task.outputs.name }}"

      - name: Upload Site task diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-task-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
          path: site/reports/site-task-diagnostic.json
          if-no-files-found: error
          retention-days: 14

      - name: Commit generated Site state
        if: github.ref == 'refs/heads/main'
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ || true
          if git diff --cached --quiet; then
            echo "No generated Site state changes to commit."
          else
            git commit -m "Update Site generated state"
            git pull --rebase
            git push
          fi

      - name: Skip generated state commit on non-main refs
        if: github.ref != 'refs/heads/main'
        run: echo "Validation-only ref; generated state commit is restricted to main."

      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

      - name: Verify governed transition public surfaces
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: site
        run: |
          for attempt in $(seq 1 12); do
            if python scripts/check_governed_transition_live_urls.py; then
              exit 0
            fi
            echo "Public observatory verification attempt ${attempt}/12 did not pass; waiting for Pages propagation."
            sleep 10
          done
          echo "Governed transition public surfaces did not verify after deployment retries."
          exit 1

      - name: Verify External Chat public surfaces
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: site
        run: |
          for attempt in $(seq 1 12); do
            if python scripts/check_external_chat_live_routes.py; then
              exit 0
            fi
            echo "External Chat verification attempt ${attempt}/12 did not pass; waiting for Pages or gateway propagation."
            sleep 10
          done
          echo "External Chat public surfaces did not verify after deployment retries."
          exit 1

      - name: Build External Chat activation evidence
        if: always()
        working-directory: site
        env:
          STEGVERSE_PAGES_DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
          STEGVERSE_GATEWAY_BASE_URL: https://stegverse-ecosystem-chat-gateway.onrender.com
        run: python scripts/build_external_chat_activation_evidence.py

      - name: Upload External Chat live verification receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-chat-live-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: site/reports/external-chat-live-verification.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload External Chat activation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-chat-activation-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: site/reports/external-chat-activation-evidence.json
          if-no-files-found: error
          retention-days: 30

      - name: Write summary
        if: always()
        working-directory: site
        run: |
          echo "## Site Task Runner" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Task: ${{ steps.task.outputs.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/governed-transition-index-import-status.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          status = json.loads(Path('data/governed-transition-index-import-status.json').read_text())
          print(f"Transition projection state: {status['state']}")
          print(f"Transition projection source: {status.get('source')}")
          print(f"Transition projection hash verified: {status.get('hash_verified')}")
          print(f"Transition projection live feed: {status.get('live_orchestration_feed')}")
          PY
          fi
          if [ -f data/external-framework-catalog-import-status.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          status = json.loads(Path('data/external-framework-catalog-import-status.json').read_text())
          print(f"External framework catalog state: {status['state']}")
          print(f"External framework catalog hash verified: {status.get('hash_verified')}")
          print(f"External framework count: {status.get('framework_count')}")
          PY
          fi
          if [ -f data/ecosystem-chat-destination-activation-import-status.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          status = json.loads(Path('data/ecosystem-chat-destination-activation-import-status.json').read_text())
          print(f"Ecosystem Chat activation import: {status.get('state')}")
          print(f"Ecosystem Chat source blockers: {', '.join(status.get('source_blockers', [])) or 'none'}")
          PY
          fi
          if [ -f reports/site-task-diagnostic.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          receipt = json.loads(Path('reports/site-task-diagnostic.json').read_text())
          print(f"Status: {receipt['status']}")
          print(f"Failed validator: {receipt.get('failed_validator') or 'none'}")
          print(f"Exit code: {receipt['exit_code']}")
          print(f"Authority effect: {receipt['authority_effect']}")
          PY
          fi
          if [ -f reports/external-chat-live-verification.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          receipt = json.loads(Path('reports/external-chat-live-verification.json').read_text())
          print(f"External Chat live verification: {receipt.get('result')}")
          print(f"External Chat failure class: {receipt.get('failure_class') or 'none'}")
          print(f"Mutation required disabled: {receipt.get('mutation_required_disabled')}")
          PY
          fi
          if [ -f reports/external-chat-activation-evidence.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          evidence = json.loads(Path('reports/external-chat-activation-evidence.json').read_text())
          print(f"External Chat activation evidence: {evidence.get('result')}")
          print(f"External Chat evidence SHA-256: {evidence.get('evidence_sha256')}")
          print(f"External Chat evidence authority: none")
          PY
          fi
          echo "Canonical progression: Site Bootstrap Validate -> Site Task Runner all-local on main." >> "$GITHUB_STEP_SUMMARY"
          echo "Boundary: generated Site state is committed and deployed only from main after task validation succeeds; activation import status is retained earlier as non-authorizing continuation evidence." >> "$GITHUB_STEP_SUMMARY"
