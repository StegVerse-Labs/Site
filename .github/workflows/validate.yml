name: Site Bootstrap Validate

on:
  workflow_dispatch:
  schedule:
    - cron: "11 * * * *"
  push:
  pull_request:

permissions:
  contents: write

jobs:
  adjacent-construction-receipt:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate authoritative adjacent-construction packet
        run: python scripts/persist_authoritative_site_receipt.py
      - name: Persist Site-owned adjacent-construction receipt
        run: |
          if git diff --quiet -- data/autonomy; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/autonomy/adjacent-construction-receipt.json data/autonomy/adjacent-construction-status.json
          git commit -m "chore: persist Site adjacent construction receipt [adjacent-target-output]"
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: site-adjacent-construction-receipt
          path: |
            data/autonomy/adjacent-construction-receipt.json
            data/autonomy/adjacent-construction-status.json
          if-no-files-found: error

  st017-sandbox:
    name: ST-017 isolated validation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Execute Site sandbox
        run: python scripts/run_sandbox_validation.py
      - name: Upload Site sandbox report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-st017-sandbox-report
          path: reports/sandbox-first-validation.report.json
          if-no-files-found: error
          retention-days: 30

  bootstrap-validate:
    needs: st017-sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inventory workflow entry points
        run: python scripts/write_site_workflow_inventory.py
      - name: Enforce two operational workflows
        run: python scripts/check_site_workflow_inventory.py
      - name: Validate application
        run: python scripts/check_ecosystem_chat_application.py
      - name: Synchronize verified custody state into authoritative Site records
        run: python scripts/sync_ecosystem_chat_custody_state.py
      - name: Check out canonical adapter source for bounded runtime verification
        uses: actions/checkout@v4
        with:
          repository: StegVerse-org/LLM-adapter
          ref: main
          path: adapter-source
          persist-credentials: false
      - name: Install canonical adapter service dependencies
        run: python -m pip install -e './adapter-source[service]'
      - name: Start canonical portable-node gateway fail-closed
        env:
          STEGVERSE_PROVIDER_ENABLED: "false"
          STEGVERSE_EXTERNAL_MUTATION_ENABLED: "false"
          STEGVERSE_STORAGE_DURABLE_ACROSS_RESTARTS: "true"
          STEGVERSE_TRANSITION_DB: ${{ runner.temp }}/stegverse-site-runtime.db
          STEGVERSE_EXTERNAL_REVIEW_DB: ${{ runner.temp }}/stegverse-site-review.db
          STEGVERSE_USAGE_SESSION_DB: ${{ runner.temp }}/stegverse-site-usage.db
        run: |
          python -m uvicorn llm_adapter.combined_gateway:app --app-dir adapter-source --host 127.0.0.1 --port 8000 > portable-node-runtime.log 2>&1 &
          echo $! > portable-node-runtime.pid
      - name: Execute Site-to-portable-node runtime slice
        run: python scripts/verify_portable_node_site_runtime.py
      - name: Stop portable-node runtime
        if: always()
        run: |
          if [ -f portable-node-runtime.pid ]; then
            kill "$(cat portable-node-runtime.pid)" 2>/dev/null || true
          fi
      - name: Write bound current-main validation receipt
        run: python scripts/write_site_current_main_validation_receipt.py
      - name: Write validation artifact manifest
        run: python scripts/write_site_validation_artifact_manifest.py
      - name: Verify validation artifact bundle
        run: python scripts/verify_site_validation_artifact_bundle.py .
      - name: Upload application validation result, receipt, manifest, and portable-node runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-application-validation-result
          path: |
            site_application_validation.result.json
            site_current_main_validation.receipt.json
            site_current_main_validation.manifest.json
            reports/portable-node-site-runtime.json
            portable-node-runtime.log
            docs/ECOSYSTEM_CHAT_ACTIVE_BUILDING_CYCLE_2026-07-21_CUSTODY_RECONSTRUCTION.md
          if-no-files-found: error
      - name: Persist authoritative Ecosystem Chat custody state
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/ECOSYSTEM_CHAT_BUILD_GOAL.md \
            docs/ECOSYSTEM_CHAT_ACTIVE_BUILDING.md \
            docs/ECOSYSTEM_CHAT_ACTIVE_BUILDING_CYCLE_2026-07-21_CUSTODY_RECONSTRUCTION.md
          if git diff --cached --quiet; then
            echo "Authoritative Ecosystem Chat custody state unchanged."
          else
            git commit -m "docs: retain verified Ecosystem Chat custody state [skip ci]"
            git pull --rebase
            git push
          fi
      - name: Record live mirror verification status
        id: live_verification
        run: |
          set +e
          python scripts/check_site_mirror_live_verification.py --json > site_mirror_live_verification.result.json
          status=$?
          cat site_mirror_live_verification.result.json
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload live mirror verification result
        uses: actions/upload-artifact@v4
        with:
          name: site-mirror-live-verification-result
          path: site_mirror_live_verification.result.json
