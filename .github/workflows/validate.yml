name: Site Bootstrap Validate

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  st017-sandbox:
    name: ST-017 isolated validation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Execute Site sandbox
        run: python scripts/run_sandbox_validation.py
      - name: Upload Site sandbox report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-st017-sandbox-report
          path: reports/sandbox-first-validation.report.json
          if-no-files-found: error
          retention-days: 30

  bootstrap-validate:
    needs: st017-sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inventory workflow entry points
        run: python scripts/write_site_workflow_inventory.py
      - name: Enforce two operational workflows
        run: python scripts/check_site_workflow_inventory.py
      - name: Validate application
        run: python scripts/check_ecosystem_chat_application.py
      - name: Validate authoritative adjacent-construction packet
        run: python scripts/persist_authoritative_site_receipt.py
      - name: Write bound current-main validation receipt
        run: python scripts/write_site_current_main_validation_receipt.py
      - name: Write validation artifact manifest
        run: python scripts/write_site_validation_artifact_manifest.py
      - name: Verify validation artifact bundle
        run: python scripts/verify_site_validation_artifact_bundle.py .
      - name: Persist Site-owned adjacent-construction receipt
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- data/autonomy; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/autonomy/adjacent-construction-receipt.json data/autonomy/adjacent-construction-status.json
          git commit -m "chore: persist Site adjacent construction receipt [adjacent-target-output]"
          git push
      - name: Upload application validation result, receipt, and manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-application-validation-result
          path: |
            site_application_validation.result.json
            site_current_main_validation.receipt.json
            site_current_main_validation.manifest.json
            data/autonomy/adjacent-construction-receipt.json
            data/autonomy/adjacent-construction-status.json
          if-no-files-found: error
      - name: Record live mirror verification status
        id: live_verification
        run: |
          set +e
          python scripts/check_site_mirror_live_verification.py --json > site_mirror_live_verification.result.json
          status=$?
          cat site_mirror_live_verification.result.json
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload live mirror verification result
        uses: actions/upload-artifact@v4
        with:
          name: site-mirror-live-verification-result
          path: site_mirror_live_verification.result.json
