name: Site Bootstrap Validate

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bootstrap-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate application
        run: python scripts/check_ecosystem_chat_application.py
