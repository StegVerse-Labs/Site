name: Site Mirror Closure Guard

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/SITE_MIRROR_HANDOFF.md"
      - "docs/SITE_MIRROR_CLOSURE_NEXT_BUILD.md"
      - "docs/SITE_MIRROR_CLOSURE_GUARD.md"
      - "docs/SITE_MIRROR_ACTIVATION_LEDGER.md"
      - "docs/SITE_MIRROR_ACTIVATION_LEDGER.json"
      - "docs/SITE_MIRROR_ACTIVATION_STATUS.md"
      - "docs/SITE_MIRROR_EVIDENCE_REQUIREMENTS.md"
      - "docs/SITE_MIRROR_EVIDENCE_TRANSITION_RULES.md"
      - "docs/SITE_SELF_MANAGED_COMPLETION.md"
      - "docs/SITE_MIRROR_ECOSYSTEM_MANAGEMENT_HANDOFF.md"
      - "docs/SITE_TT_CODE_REPRESENTATION_MIRROR.md"
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.md"
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.json"
      - "scripts/check_site_mirror_handoff.py"
      - "scripts/check_site_mirror_closure_next_build.py"
      - "scripts/check_site_mirror_closure_guard.py"
      - "scripts/check_site_mirror_activation_ledger.py"
      - "scripts/check_site_mirror_activation_status.py"
      - "scripts/check_site_mirror_evidence_requirements.py"
      - "scripts/check_site_mirror_evidence_transition_rules.py"
      - "scripts/check_site_self_managed_completion.py"
      - "scripts/check_site_tt_code_representation_mirror.py"
      - "scripts/render_tt_code_representation_status.py"

jobs:
  closure-guard:
    name: Verify Site mirror closure boundary
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Check Site mirror handoff
        run: python scripts/check_site_mirror_handoff.py

      - name: Check Site mirror closure next-build packet
        run: python scripts/check_site_mirror_closure_next_build.py

      - name: Check Site mirror closure guard packet
        run: python scripts/check_site_mirror_closure_guard.py

      - name: Check Site mirror activation ledger
        run: python scripts/check_site_mirror_activation_ledger.py

      - name: Check Site mirror activation status
        run: python scripts/check_site_mirror_activation_status.py

      - name: Check Site mirror evidence requirements
        run: python scripts/check_site_mirror_evidence_requirements.py

      - name: Check Site mirror evidence transition rules
        run: python scripts/check_site_mirror_evidence_transition_rules.py

      - name: Check Site self-managed completion
        run: python scripts/check_site_self_managed_completion.py

      - name: Check Site TT code-representation mirror
        run: python scripts/check_site_tt_code_representation_mirror.py

      - name: Render Site TT code-representation status
        run: python scripts/render_tt_code_representation_status.py

      - name: Write summary
        if: always()
        run: |
          echo "## Site Mirror Closure Guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Handoff:** docs/SITE_MIRROR_HANDOFF.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Closure packet:** docs/SITE_MIRROR_CLOSURE_NEXT_BUILD.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Closure guard packet:** docs/SITE_MIRROR_CLOSURE_GUARD.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Activation ledger:** docs/SITE_MIRROR_ACTIVATION_LEDGER.json" >> "$GITHUB_STEP_SUMMARY"
          echo "**Activation status:** docs/SITE_MIRROR_ACTIVATION_STATUS.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence requirements:** docs/SITE_MIRROR_EVIDENCE_REQUIREMENTS.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence transition rules:** docs/SITE_MIRROR_EVIDENCE_TRANSITION_RULES.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Self-managed completion:** docs/SITE_SELF_MANAGED_COMPLETION.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Ecosystem management handoff:** docs/SITE_MIRROR_ECOSYSTEM_MANAGEMENT_HANDOFF.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**TT code mirror:** docs/SITE_TT_CODE_REPRESENTATION_MIRROR.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**TT code status:** docs/SITE_TT_CODE_REPRESENTATION_STATUS.md" >> "$GITHUB_STEP_SUMMARY"
          echo "**Handoff checker:** scripts/check_site_mirror_handoff.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Closure checker:** scripts/check_site_mirror_closure_next_build.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Closure guard checker:** scripts/check_site_mirror_closure_guard.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Activation ledger checker:** scripts/check_site_mirror_activation_ledger.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Activation status checker:** scripts/check_site_mirror_activation_status.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence requirements checker:** scripts/check_site_mirror_evidence_requirements.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Evidence transition rules checker:** scripts/check_site_mirror_evidence_transition_rules.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Self-managed completion checker:** scripts/check_site_self_managed_completion.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**TT mirror checker:** scripts/check_site_tt_code_representation_mirror.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**TT status renderer:** scripts/render_tt_code_representation_status.py" >> "$GITHUB_STEP_SUMMARY"
          echo "**Assessment state:** repository-managed continuation ready; full activation still requires Publisher closure evidence and propagated TT bundle evidence." >> "$GITHUB_STEP_SUMMARY"
          echo "**Activation boundary:** Publisher closure remains required before activation can be claimed; TT mirrored status does not grant execution authority." >> "$GITHUB_STEP_SUMMARY"
