name: Site T-CL Status

on:
  push:
    paths:
      - "docs/SITE_TCL_STATUS.json"
      - "docs/SITE_TCL_STATUS.md"
      - "scripts/check_site_tcl_status.py"
      - ".github/workflows/site-tcl-status.yml"
  pull_request:
    paths:
      - "docs/SITE_TCL_STATUS.json"
      - "docs/SITE_TCL_STATUS.md"
      - "scripts/check_site_tcl_status.py"
      - ".github/workflows/site-tcl-status.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/check_site_tcl_status.py
