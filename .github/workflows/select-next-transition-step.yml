name: Select Next Transition Step

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/transition-release-state-v1.json"
      - "data/transition-decision-rules-v1.json"
      - "data/next-transition-build-candidate-v1.json"
      - "tools/transition_next_step_selector.py"
      - ".github/workflows/select-next-transition-step.yml"

permissions:
  contents: read

concurrency:
  group: select-next-transition-step-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select-next-step:
    name: Determine next admissible transition action
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run next-step selector
        run: |
          python tools/transition_next_step_selector.py \
            --state data/transition-release-state-v1.json \
            --rules data/transition-decision-rules-v1.json \
            --out-dir next_transition_step_reports \
            --write-public

          cp data/next-transition-build-candidate-v1.json \
            next_transition_step_reports/next-transition-build-candidate-v1.json

      - name: Upload next-step selector report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-transition-step-report
          path: next_transition_step_reports/
          if-no-files-found: error
