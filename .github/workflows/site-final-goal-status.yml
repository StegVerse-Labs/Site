name: Site Final Goal Status

on:
  workflow_dispatch:
  schedule:
    - cron: '7 */6 * * *'
  push:
    paths:
      - "docs/SITE_TT_CODE_REPRESENTATION_STATUS.json"
      - "docs/SITE_GOVERNANCE_OBSERVATORY_STATUS.json"
      - "scripts/update_site_final_goal_status.py"
      - ".github/workflows/site-final-goal-status.yml"

permissions:
  contents: write

jobs:
  update-final-goal-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site
        uses: actions/checkout@v4

      - name: Update final goal status
        run: python scripts/update_site_final_goal_status.py

      - name: Commit final goal status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/SITE_FINAL_GOAL_STATUS.md docs/SITE_FINAL_GOAL_STATUS.json
          if git diff --cached --quiet; then
            echo "No final goal status changes to commit."
          else
            git commit -m "Update Site final goal status"
            git push
          fi
