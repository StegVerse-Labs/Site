name: Ingest Bundle

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: "Bundle path relative to repo root, for example incoming/update.zip. Defaults to newest incoming/*.zip"
        required: false
        default: ""
      apply:
        description: "Apply bundle changes"
        required: true
        type: boolean
        default: true

  push:
    branches:
      - main
    paths:
      - "incoming/*.zip"
      - "incoming/**/*.zip"

permissions:
  contents: write

concurrency:
  group: ingest-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    name: Ingest uploaded bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run bundle ingestion
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUNDLE: ${{ github.event.inputs.bundle }}
          INPUT_APPLY: ${{ github.event.inputs.apply }}
        run: |
          APPLY_FLAG=""

          if [ "$EVENT_NAME" = "push" ]; then
            APPLY_FLAG="--apply"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_APPLY" = "true" ]; then
            APPLY_FLAG="--apply"
          fi

          BUNDLE_ARG=""
          if [ -n "$INPUT_BUNDLE" ]; then
            BUNDLE_ARG="--bundle $INPUT_BUNDLE"
          fi

          python tools/bundle_ingest.py \
            --repo-root . \
            --policy data/bundle-ingestion-policy-v1.json \
            --out-dir ingestion_reports \
            $BUNDLE_ARG \
            $APPLY_FLAG

      - name: Commit ingested changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_APPLY: ${{ github.event.inputs.apply }}
        run: |
          SHOULD_COMMIT="false"

          if [ "$EVENT_NAME" = "push" ]; then
            SHOULD_COMMIT="true"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_APPLY" = "true" ]; then
            SHOULD_COMMIT="true"
          fi

          if [ "$SHOULD_COMMIT" != "true" ]; then
            echo "Dry run only. No commit will be created."
            exit 0
          fi

          git config user.name "StegVerse Bundle Ingestor"
          git config user.email "builder@stegverse.org"

          git add .

          if git diff --cached --quiet; then
            echo "No ingested changes to commit."
          else
            git commit -m "ingest uploaded bundle with receipt"
            git push
          fi

      - name: Upload ingestion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-ingestion-report
          path: ingestion_reports/
          if-no-files-found: error
